name: Daily Stock Screen

on:
  schedule:
    # 台灣時間約 16:00（UTC 08:00），盤後 2.5 小時開始跑、約 17:30 結束
    # 提早 3 小時版（從原本 19:00 開始改到 16:00）
    # ⚠️ 風險：TWSE 三大法人通常 16:30-17:00 後才公布，FinMind 同步可能再
    # 延後 30-60min。在運行末段抓的股票如果 FinMind 還沒同步當日法人資料，
    # f_60d 會少一日 → 60 日累計約 1-2% 噪音、影響極小。
    - cron: "0 8 * * 0-4"
  workflow_dispatch:  # 允許手動觸發

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read  # checkout + release download

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 從 GitHub Actions cache 還原 SQLite DB（避免每次重新下載全量資料）
      - name: Restore DB cache
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: data/cache.db
          key: stock-db-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            stock-db-${{ runner.os }}-bootstrap-
            stock-db-${{ runner.os }}-

      # cache miss 時從最新 release 下載（本地 bootstrap 後上傳的 DB）
      - name: Download DB from release (fallback)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          # 用 API 查最新 release 的 asset URL（比 gh release download 更可靠）
          ASSET_URL=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/pamsinna/stockstw/releases/latest" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assets = data.get('assets', [])
          for a in assets:
              if a['name'] == 'cache.db.gz':
                  print(a['url'])
                  break
          " 2>/dev/null || true)

          if [ -n "$ASSET_URL" ]; then
            echo "Downloading cache.db.gz from release..."
            curl -Lf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/octet-stream" \
              "$ASSET_URL" -o data/cache.db.gz \
              && gzip -d data/cache.db.gz \
              && echo "DB downloaded and decompressed from release ($(du -sh data/cache.db | cut -f1))" \
              || echo "Download failed, starting with empty DB"
          else
            echo "No release asset found, starting with empty DB"
          fi

      - name: Create reports dir
        run: mkdir -p reports

      - name: Run daily screen
        env:
          FINMIND_TOKEN:       ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py screen

      # 更新後的 DB 存回 cache，下次跑只需補 1 天資料
      - name: Save updated DB to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/cache.db
          key: stock-db-${{ runner.os }}-${{ github.run_number }}

      # 上傳今日報告為 artifact（保留 7 天）
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: signals-${{ github.run_id }}
          path: reports/signals_*.csv
          retention-days: 7
