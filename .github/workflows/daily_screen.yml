name: Daily Stock Screen

on:
  schedule:
    # 台灣時間約 17:00（UTC 09:00），盤後 3.5 小時開始跑、約 18:30 結束
    # 三大法人約 17:00 後公布，FinMind 同步約再延 30min；運行末段抓的
    # 股票應已有當日法人資料，f_60d 完整。
    - cron: "0 9 * * 0-4"
  workflow_dispatch:  # 允許手動觸發

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write  # checkout + release download + release upload (DB snapshot)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 從 GitHub Actions cache 還原 SQLite DB（避免每次重新下載全量資料）
      - name: Restore DB cache
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: data/cache.db
          key: stock-db-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            stock-db-${{ runner.os }}-bootstrap-
            stock-db-${{ runner.os }}-

      # cache miss 時從最新 release 下載（本地 bootstrap 後上傳的 DB）
      - name: Download DB from release (fallback)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          # 用 API 查最新 release 的 asset URL（比 gh release download 更可靠）
          ASSET_URL=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/pamsinna/stockstw/releases/latest" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assets = data.get('assets', [])
          for a in assets:
              if a['name'] == 'cache.db.gz':
                  print(a['url'])
                  break
          " 2>/dev/null || true)

          if [ -n "$ASSET_URL" ]; then
            echo "Downloading cache.db.gz from release..."
            curl -Lf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/octet-stream" \
              "$ASSET_URL" -o data/cache.db.gz \
              && gzip -d data/cache.db.gz \
              && echo "DB downloaded and decompressed from release ($(du -sh data/cache.db | cut -f1))" \
              || echo "Download failed, starting with empty DB"
          else
            echo "No release asset found, starting with empty DB"
          fi

      - name: Create reports dir
        run: mkdir -p reports

      - name: Run daily screen
        env:
          FINMIND_TOKEN:       ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py screen

      # 更新後的 DB 存回 cache，下次跑只需補 1 天資料
      - name: Save updated DB to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/cache.db
          key: stock-db-${{ runner.os }}-${{ github.run_number }}

      # 上傳今日報告為 artifact（保留 7 天）
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: signals-${{ github.run_id }}
          path: reports/signals_*.csv
          retention-days: 7

      # 上傳更新後的 DB 到 GitHub Release（給本地同步用）
      # 使用固定 tag `db-daily-latest`，每次 force-update 覆蓋
      - name: Upload DB snapshot to release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # 防止 SQLite 寫到一半被 tar 讀到（保險措施）
          pkill -f "python main.py" 2>/dev/null || true
          sleep 3

          # 壓縮 DB（先清舊檔避免 gzip 拒絕覆蓋）
          rm -f data/cache.db.gz
          echo "Compressing cache.db ($(du -sh data/cache.db | cut -f1))..."
          gzip -k -9 -f data/cache.db
          echo "Compressed: $(du -sh data/cache.db.gz | cut -f1)"

          TAG="db-daily-latest"
          DATE=$(date -u +"%Y-%m-%d")
          TITLE="Daily DB snapshot ${DATE}"
          NOTES="Auto-updated by daily_screen.yml on ${DATE} UTC.

          Restore locally:
              gh release download ${TAG} --repo pamsinna/stockstw --pattern 'cache.db.gz' --output data/cache.db.gz --clobber
              gzip -d -f data/cache.db.gz"

          # 砍掉舊 release（若存在）+ 重新建立（GitHub 不支援 release file replace）
          gh release delete "$TAG" --repo pamsinna/stockstw --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" data/cache.db.gz \
            --repo pamsinna/stockstw \
            --title "$TITLE" \
            --notes "$NOTES"

          echo "DB snapshot uploaded to release tag: $TAG"

      # 若 universe 內仍有大量 stale 股票（首次抓 / 卡舊日期），自動觸發下一輪
      # 安全閥：限 5 次連續 backfill；超過則停止，避免無限迴圈
      - name: Auto-retry if backfill incomplete
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # 計算 stale 數：universe 內 fetch_log price 缺 entry 或 last_date 早於 7 天前
          STALE=$(python3 -c "
          import sqlite3
          from datetime import date, timedelta
          con = sqlite3.connect('data/cache.db')
          cutoff = (date.today() - timedelta(days=7)).isoformat()
          n = con.execute('''
              SELECT COUNT(*) FROM stock_universe u
              WHERE NOT EXISTS (
                  SELECT 1 FROM fetch_log f
                  WHERE f.stock_id = u.stock_id AND f.dataset = 'price'
                    AND f.last_date >= ? AND f.last_date < '9999-01-01'
              )
          ''', (cutoff,)).fetchone()[0]
          print(n)
          ")

          THRESHOLD=50
          MAX_RETRY=5

          # 數最近 60 分鐘內已連續觸發幾次（用 created_at 過濾，避免無限迴圈）
          RECENT=$(gh api "repos/pamsinna/stockstw/actions/workflows/daily_screen.yml/runs?event=workflow_dispatch&per_page=20" \
            --jq "[.workflow_runs[] | select(.created_at > (now - 3600 | strftime(\"%Y-%m-%dT%H:%M:%SZ\")))] | length" 2>/dev/null || echo "0")

          echo "Stale stocks: $STALE  (threshold: $THRESHOLD)"
          echo "Recent dispatched runs (60min): $RECENT  (max: $MAX_RETRY)"

          if [ "$STALE" -le "$THRESHOLD" ]; then
            echo "✅ Backfill complete enough ($STALE ≤ $THRESHOLD). 不觸發下一輪。"
          elif [ "$RECENT" -ge "$MAX_RETRY" ]; then
            echo "⚠️ 達到連續 retry 上限 ($MAX_RETRY 次/小時)，暫停以避免無限迴圈。"
            echo "    請等下次 cron 或手動觸發。"
          else
            echo "🔁 仍有 $STALE 支 stale，觸發下一輪 backfill..."
            gh workflow run "Daily Stock Screen" --repo pamsinna/stockstw
            echo "✓ 已觸發新 run"
          fi
