name: Daily Stock Screen

on:
  schedule:
    # 台灣時間每日 08:00（UTC 00:00）開盤前傳送前日訊號
    - cron: "0 0 * * 1-5"
  workflow_dispatch:  # 允許手動觸發

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read  # checkout + release download

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 從 GitHub Actions cache 還原 SQLite DB（避免每次重新下載全量資料）
      - name: Restore DB cache
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: data/cache.db
          key: stock-db-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            stock-db-${{ runner.os }}-bootstrap-
            stock-db-${{ runner.os }}-

      # cache miss 時從最新 release 下載（本地 bootstrap 後上傳的 DB）
      - name: Download DB from release (fallback)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          gh release download --pattern "cache.db" --dir data/ --clobber \
            && echo "DB downloaded from release" \
            || echo "No release found, starting with empty DB"

      - name: Create reports dir
        run: mkdir -p reports

      - name: Run daily screen
        env:
          FINMIND_TOKEN:    ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py screen

      # 更新後的 DB 存回 cache，下次跑只需補 1 天資料
      - name: Save updated DB to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/cache.db
          key: stock-db-${{ runner.os }}-${{ github.run_number }}

      # 上傳今日報告為 artifact（保留 7 天）
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: signals-${{ github.run_id }}
          path: reports/signals_*.csv
          retention-days: 7
