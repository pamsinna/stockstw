name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Import smoke test
        run: |
          python -c "from data.cache import init_db, load_prices, save_prices; print('cache OK')"
          python -c "from data.fetcher import fetch_price, fetch_institutional; print('fetcher OK')"
          python -c "from data.universe import build_universe; print('universe OK')"
          python -c "from technical.signals import STRATEGIES, signal_short_vol_breakout; print(f'signals OK ({len(STRATEGIES)} strategies)')"
          python -c "from technical.indicators import add_all, merge_institutional; print('indicators OK')"
          python -c "from fundamental.quality_filter import batch_fundamentals; print('fundamental OK')"
          python -c "from backtest.engine import run_backtest, run_portfolio_backtest; print('engine OK')"
          python -c "from backtest.metrics import calc_metrics; print('metrics OK')"
          python -c "from screener.daily_run import run_daily, screen_today; print('screener OK')"
          python -c "from notify.telegram_bot import format_signals; print('notify OK')"

      - name: Signal + backtest smoke test (synthetic data)
        run: |
          python - <<'EOF'
          import pandas as pd
          import numpy as np
          from technical.signals import (
              signal_short_vol_breakout,
              signal_swing_ma_kd_inst,
              signal_swing_dual_inst,
              signal_longterm_quality_entry,
              signal_revenue_momentum,
          )
          from backtest.engine import run_backtest

          rng = np.random.default_rng(42)
          n = 150
          dates = pd.date_range("2023-01-01", periods=n, freq="B")
          price = 100 + rng.standard_normal(n).cumsum()
          df = pd.DataFrame({
              "date":   dates,
              "open":   price,
              "high":   price + rng.uniform(0, 2, n),
              "low":    price - rng.uniform(0, 2, n),
              "close":  price + rng.standard_normal(n) * 0.5,
              "volume": rng.integers(1000, 10000, n).astype(float),
          })

          for fn, col in [
              (signal_short_vol_breakout,     "signal_short"),
              (signal_swing_ma_kd_inst,       "signal_swing"),
              (signal_swing_dual_inst,        "signal_dual_inst"),
              (signal_longterm_quality_entry, "signal_long"),
          ]:
              result = fn(df)
              assert col in result.columns, f"Missing column: {col}"
              print(f"  {fn.__name__}: OK ({result[col].sum()} signals)")

          result = signal_revenue_momentum(df, rev_df=None)
          assert "signal_rev" in result.columns
          print("  signal_revenue_momentum (no rev data): OK")

          df2 = signal_short_vol_breakout(df)
          bt = run_backtest(df2, "signal_short", 0.08, 0.05, 5,
                            "2023-01-01", "2023-12-31", "TEST", "TWSE")
          print(f"  run_backtest: OK ({len(bt.trades)} trades)")

          print("All smoke tests passed.")
          EOF
