name: Bootstrap DB (run once)

on:
  workflow_dispatch:  # 手動觸發；完成後若資料不足會自動重觸發

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 允許 3 小時；每股 2 API calls × 6s = ~12s，3013 股需 ~4 次重跑
    permissions:
      actions: write  # 允許 gh workflow run 自我觸發

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create dirs
        run: mkdir -p reports data

      # 先嘗試還原上一次的部分進度（讓重跑時跳過已下載的股票）
      - name: Restore previous DB (if any)
        uses: actions/cache/restore@v4
        with:
          path: data/cache.db
          key: stock-db-${{ runner.os }}-bootstrap-never-match
          restore-keys: |
            stock-db-${{ runner.os }}-bootstrap-
            stock-db-${{ runner.os }}-

      - name: Download price + institutional
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python main.py download

      # 月營收在 price/institutional 完成後再跑（獨立可恢復）
      - name: Download monthly revenue
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python main.py download-revenue

      # 確保 Python 完全停止再打包（避免 SQLite 寫到一半被 tar 讀到）
      - name: Wait for Python to stop
        if: always()
        run: pkill -f "python main.py" || true; sleep 5

      # if: always() 確保斷線或 timeout 後也存檔，重跑可以繼續
      - name: Save DB as cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/cache.db
          key: stock-db-${{ runner.os }}-bootstrap-${{ github.run_number }}

      - name: Upload DB as artifact (備份)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cache-db-bootstrap-${{ github.run_number }}
          path: data/cache.db
          retention-days: 30

      # 若資料不足 2900 支，自動觸發下一輪（cache 已存好，下輪會繼續）
      - name: Re-trigger if bootstrap incomplete
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STOCKS=$(python3 -c "
          import sqlite3, sys
          try:
              n = sqlite3.connect('data/cache.db').execute(
                  'SELECT COUNT(DISTINCT stock_id) FROM daily_price'
              ).fetchone()[0]
              print(n)
          except:
              print(0)
          ")
          echo "Stocks in DB: $STOCKS"
          if [ "$STOCKS" -lt 2900 ]; then
            echo "Incomplete — triggering next run"
            gh workflow run bootstrap.yml --repo ${{ github.repository }}
          else
            echo "Bootstrap complete"
          fi
